<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>选择申论试卷</title>
  <style>
    :root { color-scheme: light; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; }
    body { margin: 0; padding: 24px; background: #f8f6ef; color: #26332d; }
    main { max-width: 560px; margin: 0 auto; }
    h1 { margin: 12px 0 8px; font-size: 24px; }
    p { color: #68736c; line-height: 1.65; }
    .panel { margin-top: 24px; padding: 24px; border-radius: 18px; background: #fffdf7; border: 1px solid #e8e2d7; }
    label { display: flex; align-items: center; justify-content: center; min-height: 48px; border-radius: 12px; background: #1f4d3a; color: #fff; font-weight: 700; }
    input { display: none; }
    #status { margin-top: 18px; white-space: pre-wrap; word-break: break-word; }
    .error { color: #b84332; }
  </style>
</head>
<body>
  <main>
    <h1>选择历年真题</h1>
    <p>选择 PDF、Word、TXT 或 Markdown 文件。</p>
    <section class="panel">
      <label for="paper">选择文件</label>
      <input id="paper" type="file" accept=".pdf,.docx,.txt,.md,application/pdf,text/plain,text/markdown">
      <div id="status">请选择文件</div>
    </section>
  </main>
  <script>
    const input = document.getElementById('paper')
    const status = document.getElementById('status')
    function finish(data) {
      if (window.wx && wx.miniProgram) {
        wx.miniProgram.postMessage({ data })
        setTimeout(() => wx.miniProgram.navigateBack(), 250)
        return
      }
      status.textContent = `解析完成：${data.filename}\n请在微信小程序中打开此入口继续批改。`
    }
    input.addEventListener('change', async () => {
      const file = input.files && input.files[0]
      if (!file) return
      if (file.size > 25 * 1024 * 1024) {
        status.className = 'error'
        status.textContent = '文件超过25MB，请重新选择。'
        input.value = ''
        return
      }
      status.className = ''
      status.textContent = '正在上传并解析，请稍候……'
      const form = new FormData()
      form.append('file', file)
      try {
        const response = await fetch('/api/essay/paper-upload', { method: 'POST', body: form })
        const data = await response.json()
        if (!response.ok || data.error) throw new Error(data.error || '文件解析失败')
        finish({ type: 'essay-paper', paper_id: data.paper_id, filename: data.filename, chars: data.chars })
      } catch (error) {
        status.className = 'error'
        status.textContent = error.message || '文件解析失败，请重试。'
      }
    })
  </script>
</body>
</html>
