services:
  - type: web
    name: shizheng-kb
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --timeout 120 --workers 2
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: SILICONFLOW_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: FLASK_DEBUG
        value: "0"
    plan: free
    region: singapore
